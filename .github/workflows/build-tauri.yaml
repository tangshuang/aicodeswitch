name: Build and Release Tauri App

on:
  workflow_run:
    workflows: ["Publish To NPM"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 3.0.6)'
        required: false
      force_build:
        description: 'Force build even if tag exists'
        required: false
        type: boolean
        default: false

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check if should build
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION=$(node -p "require('./package.json').version")
            fi
            TAG="v${VERSION}"
            if [ "${{ github.event.inputs.force_build }}" = "true" ]; then
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "version=${VERSION}" >> $GITHUB_OUTPUT
              echo "tag=${TAG}" >> $GITHUB_OUTPUT
            elif git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "should_build=false" >> $GITHUB_OUTPUT
            else
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "version=${VERSION}" >> $GITHUB_OUTPUT
              echo "tag=${TAG}" >> $GITHUB_OUTPUT
            fi
          else
            VERSION=$(node -p "require('./package.json').version")
            TAG="v${VERSION}"
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          fi

  build-tauri:
    needs: check-release
    if: needs.check-release.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
            target: x86_64-pc-windows-msvc
            args: ""
            bundle: "msi nsis"
          - os: macos-15-intel
            platform: macos
            arch: x64
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
            bundle: "dmg app"
          - os: macos-14
            platform: macos
            arch: aarch64
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
            bundle: "dmg app"
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
            args: ""
            bundle: "deb rpm appimage"
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
        shell: bash

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tauri/target
            !tauri/target/**/bundle
          key: ${{ runner.os }}-cargo-v5-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v5-

      - name: Install Node.js dependencies
        run: yarn install --frozen-lockfile

      - name: Sync version to Tauri
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          node -e "
            const fs = require('fs');
            const paths = ['src-tauri/tauri.conf.json', 'tauri/tauri.conf.json', 'tauri.conf.json'];
            let path = paths.find(p => fs.existsSync(p));
            if (!path) { console.log('Config not found, skipping sync'); process.exit(0); }
            const config = JSON.parse(fs.readFileSync(path, 'utf8'));
            if (config.package) { config.package.version = '$VERSION'; }
            else { config.version = '$VERSION'; }
            fs.writeFileSync(path, JSON.stringify(config, null, 2));
            console.log('Updated ' + path + ' to $VERSION');
          "
        shell: bash

      - name: Build UI and Server
        run: yarn build

      - name: Prepare Tauri resources
        run: node tauri/prepare-resources.js

      - name: Clean previous build artifacts
        run: |
          if [ -d "tauri/target" ]; then
            find tauri/target -name "*.msi" -type f -delete
            find tauri/target -name "*.exe" -type f -delete
            find tauri/target -name "*.dmg" -type f -delete
            find tauri/target -name "*.zip" -type f -delete
          fi
        shell: bash

      - name: Build Tauri app
        run: npx tauri build ${{ matrix.args }} --bundles ${{ matrix.bundle }}
        shell: bash

      - name: Rename Windows artifacts
        if: matrix.os == 'windows-latest'
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          BUNDLE_DIR="tauri/target/release/bundle"
          cd "$BUNDLE_DIR"
          if [ -d "msi" ]; then
            for file in msi/*.msi; do
              [ -e "$file" ] || continue
              mv "$file" "msi/AI-Code-Switch-${VERSION}-Windows-x64.msi"
            done
          fi
          if [ -d "nsis" ]; then
            for file in nsis/*.exe; do
              [ -e "$file" ] || continue
              mv "$file" "nsis/AI-Code-Switch-${VERSION}-Windows-x64.exe"
            done
          fi
        shell: bash

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: |
            tauri/target/release/bundle/msi/*.msi
            tauri/target/release/bundle/nsis/*.exe

      - name: Rename macOS artifacts
        if: matrix.platform == 'macos'
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          TARGET="${{ matrix.target }}"
          BUNDLE_DIR="tauri/target/${TARGET}/release/bundle"
          cd "$BUNDLE_DIR"
          if [ -d "dmg" ]; then
            for file in dmg/*.dmg; do
              [ -e "$file" ] || continue
              mv "$file" "dmg/AI-Code-Switch-${VERSION}-macOS-${{ matrix.arch }}.dmg"
            done
          fi
          # Zip the .app bundle for release (GitHub Release 需要压缩包，不能直接上传 .app 目录)
          if [ -d "macos" ]; then
            cd macos
            for app in *.app; do
              [ -e "$app" ] || continue
              ditto -c -k --keepParent "$app" "AI-Code-Switch-${VERSION}-macOS-${{ matrix.arch }}.zip"
            done
          fi
        shell: bash

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-macos-${{ matrix.arch }}
          path: |
            tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            tauri/target/${{ matrix.target }}/release/bundle/macos/*.zip

      - name: Rename Linux artifacts
        if: matrix.platform == 'linux'
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          BUNDLE_DIR="tauri/target/release/bundle"
          cd "$BUNDLE_DIR"
          if [ -d "deb" ]; then
            for file in deb/*.deb; do
              [ -e "$file" ] || continue
              mv "$file" "deb/AI-Code-Switch-${VERSION}-Linux-${{ matrix.arch }}.deb"
            done
          fi
          if [ -d "rpm" ]; then
            for file in rpm/*.rpm; do
              [ -e "$file" ] || continue
              mv "$file" "rpm/AI-Code-Switch-${VERSION}-Linux-${{ matrix.arch }}.rpm"
            done
          fi
          if [ -d "appimage" ]; then
            for file in appimage/*.AppImage; do
              [ -e "$file" ] || continue
              mv "$file" "appimage/AI-Code-Switch-${VERSION}-Linux-${{ matrix.arch }}.AppImage"
            done
          fi
        shell: bash

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-linux-${{ matrix.arch }}
          path: |
            tauri/target/release/bundle/deb/*.deb
            tauri/target/release/bundle/rpm/*.rpm
            tauri/target/release/bundle/appimage/*.AppImage

  create-release:
    needs: [check-release, build-tauri]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    if: needs.check-release.outputs.should_build == 'true'
    steps:
      - uses: actions/checkout@v5
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "AI-Code-Switch-*" \) -exec cp {} release-assets/ \;
      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.check-release.outputs.tag }}
          name: AI Code Switch v${{ needs.check-release.outputs.version }}
          body: |
            ## 下载说明

            本版本为自动构建发布。

            ### Windows

            - 推荐下载 **`.exe`** 安装包（NSIS），无需管理员权限，安装更稳定。
            - 若使用 **`.msi`** 安装包时遇到错误码 `2503` / `2502`（通常是 Windows Installer 权限不足），请改用 `.exe`；或右键 `.msi` →「以管理员身份运行」，也可在管理员 CMD 中执行 `msiexec /i "安装包.msi"`。

            ### macOS

            - Apple Silicon（M1/M2/M3/M4）请下载 **`macOS-aarch64`** 版本的 **`.dmg`**。
            - Intel 芯片请下载 **`macOS-x64`** 版本的 **`.dmg`**。
            - `.zip` 为应用包（`.app`），适合免安装使用或手动放置到「应用程序」。
            - 若提示「无法验证开发者」或「已损坏」，请在「系统设置 → 隐私与安全性」中点击「仍要打开」，或在终端执行 `xattr -dr com.apple.quarantine /Applications/AI\ Code\ Switch.app`。

            ### Linux

            - **`.AppImage`**：可直接运行的便携版，赋予执行权限后双击即可（`chmod +x *.AppImage`）。
            - **`.deb`**：适用于 Debian / Ubuntu 及其衍生发行版（`sudo dpkg -i *.deb`）。
            - **`.rpm`**：适用于 Fedora / RHEL / openSUSE 等（`sudo rpm -i *.rpm`）。
            - 需系统已安装 WebKitGTK 运行时（多数桌面发行版自带）。

            ### 前置要求

            - 已安装 [Node.js](https://nodejs.org/)（LTS 版本，应用启动时需要）。
            - 系统要求：Windows 10 / 11（x64）、macOS 11+、主流 Linux 桌面发行版。
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}