<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Code Switch</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #2d6a4f;
      --primary-glow: rgba(45, 106, 79, 0.5);
      --bg-dark: #081c15;
      --text-primary: #ffffff;
      --text-secondary: #95d5b2;
      --text-dim: rgba(149, 213, 178, 0.5);
      --bg-card: rgba(27, 67, 50, 0.4);
      --border-subtle: rgba(45, 106, 79, 0.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 10;
      padding: 40px;
      width: 100%;
      max-width: 480px;
    }

    /* Logo 动画 */
    .logo-rings {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      position: relative;
    }

    .ring {
      position: absolute;
      border: 2px solid var(--primary);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .ring-1 { width: 80px; height: 80px; animation: spin 10s linear infinite; }
    .ring-2 { width: 56px; height: 56px; border-color: #1b4332; animation: spin 7s linear infinite reverse; }
    .ring-3 { width: 32px; height: 32px; border-color: #52b788; animation: spin 5s linear infinite; }

    .core {
      position: absolute;
      width: 16px; height: 16px;
      background: linear-gradient(135deg, var(--primary), #1b4332);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 20px var(--primary-glow);
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .title {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-bottom: 32px;
    }

    /* 日志面板 */
    .log-panel {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 16px 20px;
      min-height: 120px;
      max-height: 200px;
      overflow-y: auto;
      text-align: left;
    }

    .log-panel::-webkit-scrollbar { width: 4px; }
    .log-panel::-webkit-scrollbar-track { background: transparent; }
    .log-panel::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 2px; }

    .log-entry {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 6px 0;
      font-size: 0.85rem;
      color: var(--text-secondary);
      animation: fadeIn 0.3s ease;
    }

    .log-entry .time {
      color: var(--text-dim);
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 0.75rem;
      flex-shrink: 0;
      padding-top: 1px;
    }

    .log-entry .dot {
      width: 6px; height: 6px;
      background: var(--primary);
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px;
      box-shadow: 0 0 6px var(--primary-glow);
    }

    .log-entry.active .dot {
      animation: blink 1s ease-in-out infinite;
    }

    .log-entry.error {
      color: #e76f51;
    }

    .log-entry.error .dot {
      background: #e76f51;
      box-shadow: 0 0 6px rgba(231, 111, 81, 0.5);
    }

    .log-entry.done {
      color: #52b788;
    }

    .log-entry.done .dot {
      background: #52b788;
      box-shadow: 0 0 6px rgba(82, 183, 136, 0.5);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* 错误面板 */
    .error-panel {
      display: none;
      background: rgba(127, 29, 29, 0.3);
      border: 1px solid rgba(231, 111, 81, 0.4);
      border-radius: 10px;
      padding: 16px 20px;
      margin-top: 16px;
      text-align: left;
    }

    .error-panel.visible { display: block; }

    .error-panel .error-title {
      color: #e76f51;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .error-panel .error-cause {
      color: #f4a261;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .error-panel .error-msg {
      color: rgba(231, 111, 81, 0.85);
      font-size: 0.78rem;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
      max-height: 220px;
      overflow-y: auto;
      font-family: 'SF Mono', 'Menlo', monospace;
      background: rgba(0, 0, 0, 0.2);
      padding: 10px 12px;
      border-radius: 6px;
    }

    .error-panel .error-actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    .error-panel .error-actions button {
      background: rgba(45, 106, 79, 0.5);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      font-size: 0.78rem;
      padding: 5px 12px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .error-panel .error-actions button:hover {
      background: rgba(45, 106, 79, 0.8);
    }

    .error-panel .error-hint {
      color: var(--text-dim);
      font-size: 0.75rem;
      margin-top: 12px;
      line-height: 1.5;
    }

    /* 版本号 */
    .version {
      position: fixed;
      bottom: 16px;
      right: 20px;
      color: var(--text-dim);
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-rings">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="core"></div>
    </div>

    <div class="title">AI Code Switch</div>
    <div class="subtitle">正在启动服务，请稍候...</div>

    <div class="log-panel" id="logPanel"></div>

    <div class="error-panel" id="errorPanel">
      <div class="error-title">启动失败</div>
      <div class="error-cause" id="errorCause"></div>
      <div class="error-msg" id="errorMsg"></div>
      <div class="error-actions">
        <button id="copyDiagBtn" type="button">复制诊断信息</button>
      </div>
      <div class="error-hint">
        可将诊断信息反馈给开发者；也可尝试检查 Node.js 是否安装，或关闭后重新打开重试。
      </div>
    </div>
  </div>

  <div class="version">v2.1.0</div>

  <script>
    function getTime() {
      const d = new Date();
      return String(d.getHours()).padStart(2, '0') + ':' +
             String(d.getMinutes()).padStart(2, '0') + ':' +
             String(d.getSeconds()).padStart(2, '0');
    }

    function addLog(msg, type) {
      const panel = document.getElementById('logPanel');
      // 上一条取消 active
      const prev = panel.querySelector('.log-entry.active');
      if (prev) prev.classList.remove('active');

      const entry = document.createElement('div');
      entry.className = 'log-entry active' + (type ? ' ' + type : '');
      entry.innerHTML = '<span class="time">' + getTime() + '</span><span class="dot"></span><span>' + escapeHtml(msg) + '</span>';
      panel.appendChild(entry);
      panel.scrollTop = panel.scrollHeight;
    }

    function escapeHtml(text) {
      const el = document.createElement('span');
      el.textContent = text;
      return el.innerHTML;
    }

    function guessCause(payload) {
      if (/未检测到|不可运行|无法运行 Node|未正确安装/.test(payload)) {
        return '最可能原因：Node.js 未正确安装或不在系统 PATH。';
      }
      if (/入口文件.*缺失|not found|Server entry file not found/i.test(payload)) {
        return '最可能原因：程序文件不完整，建议重新安装。';
      }
      if (/EADDRINUSE|端口.*占用|已被占用/.test(payload)) {
        return '最可能原因：端口被占用，请关闭其它占用该端口的服务后重试。';
      }
      if (/已退出|code=|子进程.*退出/.test(payload)) {
        return '最可能原因：Node 服务进程崩溃，详见下方日志尾部。';
      }
      return '服务启动失败，请参考下方诊断信息。';
    }

    function showError(msg) {
      // 最后一行标红
      const active = document.querySelector('.log-entry.active');
      if (active) {
        active.classList.remove('active');
        active.classList.add('error');
      }

      document.getElementById('errorCause').textContent = guessCause(msg);
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorPanel').classList.add('visible');
      document.querySelector('.subtitle').textContent = '启动失败';
      document.querySelector('.subtitle').style.color = '#e76f51';
    }

    // 初始日志
    addLog('应用已启动');

    // 监听 Tauri 启动日志事件
    if (window.__TAURI__) {
      window.__TAURI__.event.listen('startup-log', function(event) {
        addLog(event.payload);
      });

      window.__TAURI__.event.listen('startup-error', function(event) {
        const payload = String(event.payload || '');
        addLog('启动失败: ' + payload.split('\n')[0], 'error');
        showError(payload);
      });

      // 复制诊断信息到剪贴板，方便用户一键反馈给开发者
      document.getElementById('copyDiagBtn').onclick = function() {
        const text = document.getElementById('errorMsg').textContent || '';
        const btn = this;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function() {
            btn.textContent = '已复制 ✓';
            setTimeout(function() { btn.textContent = '复制诊断信息'; }, 2000);
          }, function() {
            btn.textContent = '复制失败';
            setTimeout(function() { btn.textContent = '复制诊断信息'; }, 2000);
          });
        } else {
          btn.textContent = '浏览器不支持复制';
        }
      };
    } else {
      addLog('等待启动...');
    }
  </script>
</body>
</html>
